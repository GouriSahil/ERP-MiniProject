openapi: 3.0.3
info:
  title: ERP Mini Project API
  description: |
    API for the ERP Mini Project - A comprehensive educational resource planning system.
    Includes modules for students, faculty, courses, enrollments, attendance, and reporting.
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:3000/api
    description: Development server
  - url: https://api.example.com/api
    description: Production server

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User management
  - name: Students
    description: Student records and information
  - name: Faculty
    description: Faculty management
  - name: Departments
    description: Academic departments
  - name: Courses
    description: Course catalog
  - name: Terms
    description: Academic terms/semesters
  - name: Offerings
    description: Course offerings (sections)
  - name: Sessions
    description: Class sessions
  - name: Enrollments
    description: Student enrollments
  - name: Attendance
    description: Attendance tracking
  - name: Reports
    description: Reports and analytics
  - name: Audit
    description: Audit logs and security

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Check if the API is running
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: ERP API is running
                  timestamp:
                    type: string
                    format: date-time

  /auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: Create a new user account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, firstName, lastName, role]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [student, faculty, department_head, college_admin, super_admin]
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticate with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

  /auth/me:
    get:
      tags: [Authentication]
      summary: Get current user
      description: Get the authenticated user's profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'

  /students:
    get:
      tags: [Students]
      summary: List students
      description: Get a paginated list of students
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: Students retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      students:
                        type: array
                        items:
                          $ref: '#/components/schemas/Student'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
    post:
      tags: [Students]
      summary: Create student
      description: Create a new student record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreate'
      responses:
        '201':
          description: Student created successfully

  /students/{id}:
    get:
      tags: [Students]
      summary: Get student by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Student retrieved successfully
    put:
      tags: [Students]
      summary: Update student
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentUpdate'
      responses:
        '200':
          description: Student updated successfully
    delete:
      tags: [Students]
      summary: Delete student
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Student deleted successfully

  /students/{id}/enrollments:
    get:
      tags: [Students]
      summary: Get student enrollments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Enrollments retrieved successfully

  /students/{id}/attendance:
    get:
      tags: [Students]
      summary: Get student attendance summary
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
        - name: termId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Attendance summary retrieved

  /faculty:
    get:
      tags: [Faculty]
      summary: List faculty
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: Faculty list retrieved
    post:
      tags: [Faculty]
      summary: Create faculty
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacultyCreate'
      responses:
        '201':
          description: Faculty created successfully

  /faculty/{id}:
    get:
      tags: [Faculty]
      summary: Get faculty by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Faculty retrieved

  /faculty/{id}/offerings:
    get:
      tags: [Faculty]
      summary: Get faculty offerings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Offerings retrieved

  /faculty/{id}/teaching-load:
    get:
      tags: [Faculty]
      summary: Get faculty teaching load
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Teaching load retrieved

  /departments:
    get:
      tags: [Departments]
      summary: List departments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Departments retrieved
    post:
      tags: [Departments]
      summary: Create department
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DepartmentCreate'
      responses:
        '201':
          description: Department created

  /departments/{id}:
    get:
      tags: [Departments]
      summary: Get department by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Department retrieved

  /departments/{id}/faculty:
    get:
      tags: [Departments]
      summary: Get department faculty
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Faculty list retrieved

  /departments/{id}/courses:
    get:
      tags: [Departments]
      summary: Get department courses
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Courses retrieved

  /courses:
    get:
      tags: [Courses]
      summary: List courses
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DepartmentId'
      responses:
        '200':
          description: Courses retrieved
    post:
      tags: [Courses]
      summary: Create course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          description: Course created

  /courses/{id}:
    get:
      tags: [Courses]
      summary: Get course by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Course retrieved
    put:
      tags: [Courses]
      summary: Update course
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseUpdate'
      responses:
        '200':
          description: Course updated
    delete:
      tags: [Courses]
      summary: Delete course
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Course deleted

  /courses/{id}/offerings:
    get:
      tags: [Courses]
      summary: Get course offerings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Offerings retrieved

  /terms:
    get:
      tags: [Terms]
      summary: List terms
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Terms retrieved
    post:
      tags: [Terms]
      summary: Create term
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TermCreate'
      responses:
        '201':
          description: Term created

  /terms/active/current:
    get:
      tags: [Terms]
      summary: Get active term
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active term retrieved

  /offerings:
    get:
      tags: [Offerings]
      summary: List course offerings
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: termId
          in: query
          schema:
            type: string
        - name: courseId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, closed, cancelled]
      responses:
        '200':
          description: Offerings retrieved
    post:
      tags: [Offerings]
      summary: Create course offering
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferingCreate'
      responses:
        '201':
          description: Offering created

  /offerings/{id}:
    get:
      tags: [Offerings]
      summary: Get offering by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Offering retrieved
    put:
      tags: [Offerings]
      summary: Update offering
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfferingUpdate'
      responses:
        '200':
          description: Offering updated
    delete:
      tags: [Offerings]
      summary: Delete offering
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Offering deleted

  /sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: offeringId
          in: query
          schema:
            type: string
        - name: termId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [scheduled, in_progress, completed, cancelled]
      responses:
        '200':
          description: Sessions retrieved
    post:
      tags: [Sessions]
      summary: Create session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionCreate'
      responses:
        '201':
          description: Session created

  /enrollments:
    get:
      tags: [Enrollments]
      summary: List enrollments
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: studentId
          in: query
          schema:
            type: string
        - name: offeringId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [enrolled, dropped, completed, withdrawn, failed]
      responses:
        '200':
          description: Enrollments retrieved
    post:
      tags: [Enrollments]
      summary: Create enrollment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, offeringId]
              properties:
                studentId:
                  type: string
                  format: uuid
                offeringId:
                  type: string
                  format: uuid
      responses:
        '201':
          description: Enrollment created

  /attendance:
    get:
      tags: [Attendance]
      summary: List attendance records
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
        - name: studentId
          in: query
          schema:
            type: string
        - name: sessionId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [present, absent, late, excused]
      responses:
        '200':
          description: Attendance records retrieved
    post:
      tags: [Attendance]
      summary: Mark attendance
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, sessionId, status]
              properties:
                studentId:
                  type: string
                  format: uuid
                sessionId:
                  type: string
                  format: uuid
                status:
                  type: string
                  enum: [present, absent, late, excused]
                remarks:
                  type: string
      responses:
        '201':
          description: Attendance marked

  /attendance/mark:
    post:
      tags: [Attendance]
      summary: Bulk mark attendance
      description: Mark attendance for all students in a session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, attendance]
              properties:
                sessionId:
                  type: string
                  format: uuid
                attendance:
                  type: array
                  items:
                    type: object
                    required: [studentId, status]
                    properties:
                      studentId:
                        type: string
                        format: uuid
                      status:
                        type: string
                        enum: [present, absent, late, excused]
                      remarks:
                        type: string
      responses:
        '201':
          description: Attendance marked for session

  /reports/course-enrollment:
    get:
      tags: [Reports]
      summary: Course enrollment report
      security:
        - bearerAuth: []
      parameters:
        - name: termId
          in: query
          schema:
            type: string
        - name: departmentId
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Report generated

  /reports/student-attendance:
    get:
      tags: [Reports]
      summary: Student attendance report
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Report generated

  /reports/faculty-workload:
    get:
      tags: [Reports]
      summary: Faculty workload report
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Report generated

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/refresh

  parameters:
    Id:
      name: id
      in: path
      required: true
      description: Resource ID (UUID)
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      description: Page number
      schema:
        type: integer
        default: 1
        minimum: 1
    Limit:
      name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        default: 10
        minimum: 1
        maximum: 100
    Search:
      name: search
      in: query
      description: Search query
      schema:
        type: string
    DepartmentId:
      name: departmentId
      in: query
      description: Filter by department ID
      schema:
        type: string
        format: uuid

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [student, faculty, department_head, college_admin, super_admin]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          description: Student ID number
        userId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        enrollmentDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, graduated, suspended]
        user:
          $ref: '#/components/schemas/User'
        department:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            code:
              type: string

    StudentCreate:
      type: object
      required: [studentId, userId, departmentId, enrollmentDate]
      properties:
        studentId:
          type: string
        userId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        enrollmentDate:
          type: string
          format: date

    StudentUpdate:
      type: object
      properties:
        departmentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [active, inactive, graduated, suspended]

    Faculty:
      type: object
      properties:
        id:
          type: string
          format: uuid
        employeeId:
          type: string
        userId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        designation:
          type: string
          enum: [Professor, Associate Professor, Assistant Professor, Lecturer, Instructor]
        joinDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive, on_leave, retired]
        user:
          $ref: '#/components/schemas/User'

    FacultyCreate:
      type: object
      required: [employeeId, userId, departmentId, designation, joinDate]
      properties:
        employeeId:
          type: string
        userId:
          type: string
          format: uuid
        departmentId:
          type: string
          format: uuid
        designation:
          type: string
          enum: [Professor, Associate Professor, Assistant Professor, Lecturer, Instructor]
        joinDate:
          type: string
          format: date

    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        headId:
          type: string
          format: uuid
        establishedDate:
          type: string
          format: date
        status:
          type: string
          enum: [active, inactive]

    DepartmentCreate:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        headId:
          type: string
          format: uuid
        establishedDate:
          type: string
          format: date

    Course:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        description:
          type: string
        credits:
          type: integer
          minimum: 1
          maximum: 10
        departmentId:
          type: string
          format: uuid
        prerequisites:
          type: array
          items:
            type: string
            format: uuid
        status:
          type: string
          enum: [active, inactive, archived]

    CourseCreate:
      type: object
      required: [name, code, credits, departmentId]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        credits:
          type: integer
          minimum: 1
          maximum: 10
        departmentId:
          type: string
          format: uuid
        prerequisites:
          type: array
          items:
            type: string
            format: uuid

    CourseUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        credits:
          type: integer
        prerequisites:
          type: array
          items:
            type: string
            format: uuid

    Term:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [upcoming, active, completed, cancelled]

    TermCreate:
      type: object
      required: [name, code, startDate, endDate]
      properties:
        name:
          type: string
        code:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date

    Offering:
      type: object
      properties:
        id:
          type: string
          format: uuid
        section:
          type: string
        courseId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        maxCapacity:
          type: integer
        currentEnrollment:
          type: integer
        status:
          type: string
          enum: [draft, active, closed, cancelled]
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
            startTime:
              type: string
              pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
            endTime:
              type: string
              pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
            room:
              type: string

    OfferingCreate:
      type: object
      required: [courseId, termId, section, maxCapacity]
      properties:
        courseId:
          type: string
          format: uuid
        termId:
          type: string
          format: uuid
        section:
          type: string
        maxCapacity:
          type: integer
          minimum: 1
        schedule:
          type: object
          properties:
            days:
              type: array
              items:
                type: string
            startTime:
              type: string
            endTime:
              type: string
            room:
              type: string
        facultyIds:
          type: array
          items:
            type: string
            format: uuid

    OfferingUpdate:
      type: object
      properties:
        maxCapacity:
          type: integer
        status:
          type: string
          enum: [draft, active, closed, cancelled]
        schedule:
          type: object
        facultyIds:
          type: array
          items:
            type: string
            format: uuid

    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        offeringId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
        endTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
        sessionType:
          type: string
          enum: [lecture, lab, tutorial, exam, seminar]
        status:
          type: string
          enum: [scheduled, in_progress, completed, cancelled]
        topics:
          type: array
          items:
            type: string
        notes:
          type: string

    SessionCreate:
      type: object
      required: [offeringId, date, startTime, endTime, sessionType]
      properties:
        offeringId:
          type: string
          format: uuid
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        sessionType:
          type: string
          enum: [lecture, lab, tutorial, exam, seminar]
        topics:
          type: array
          items:
            type: string
        notes:
          type: string

    Enrollment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        offeringId:
          type: string
          format: uuid
        status:
          type: string
          enum: [enrolled, dropped, completed, withdrawn, failed]
        enrollmentDate:
          type: string
          format: date
        grade:
          type: string
          enum: [A, B, C, D, F, I, W, P, NP]

    AttendanceRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        studentId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        status:
          type: string
          enum: [present, absent, late, excused]
        markedAt:
          type: string
          format: date-time
        markedBy:
          type: string
          format: uuid
        remarks:
          type: string

    Pagination:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        total:
          type: integer
          example: 100
        totalPages:
          type: integer
          example: 10

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
        data:
          type: object
          properties:
            user:
              $ref: '#/components/schemas/User'
            tokens:
              type: object
              properties:
                accessToken:
                  type: string
                refreshToken:
                  type: string
                expiresIn:
                  type: integer
                  description: Access token expiry in seconds

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
